<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zmanim Pro - Dashboard</title>
    <link rel="stylesheet" href="dist/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- Montre suisse -->
    <script src="suisseclock.js"></script>

    <style>
        /* ─── Base ─────────────────────────────────────────────── */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Heebo', sans-serif;
            overflow: hidden;
            margin: 0;
            height: 100vh;
        }

        .digital-font {
            font-family: 'JetBrains Mono', monospace;
            font-variant-numeric: tabular-nums;
        }

        .settings-button {
            position: fixed;
            left: 18px;
            bottom: 84px;
            z-index: 70;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: stretch;
            justify-content: center;
            color: #fbce07;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(251, 206, 7, 0.55);
            border-radius: 999px;
            box-shadow: 0 0 14px rgba(251, 206, 7, 0.28), 0 0 34px rgba(251, 206, 7, 0.14);
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .settings-button:hover {
            transform: translateY(-2px);
            background: rgba(251, 206, 7, 0.14);
            border-color: rgba(251, 206, 7, 0.9);
        }

        .settings-button svg {
            width: 22px;
            height: 22px;
        }

         /* ─── Header layout ─────────────────────────────────────── */
        .top-menu {
            padding-top: 0.25rem;
            padding-bottom: 0.55rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.10);
        }

        .header-grid {
            display: grid;
            grid-template-columns: minmax(430px, 1.2fr) minmax(460px, 1fr) minmax(270px, 290px);
            gap: 12px;
            align-items: stretch;
            direction: ltr;
        }

        .header-card{
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(251,206,7,0.35);
            border-radius:14px;
            padding:0.42rem 0.88rem;
            min-width:0;
            overflow:hidden;
            direction:rtl;
            box-shadow:0 0 12px rgba(251,206,7,0.22),0 0 32px rgba(251,206,7,0.10);
            backdrop-filter:blur(10px);
        }

        .parasha-card { overflow:hidden; min-height:104px; }
        .header-title-line { min-width:0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }

        .weather-card {
            display:flex;
            flex-direction:column;
            gap:0.36rem;
        }

        .weather-city {
            display:flex;
            align-items:center;
            justify-content:center;
            gap:0.45rem;
            color:#fbce07;
            font-weight:900;
            font-size:1.05rem;
            line-height:1.1;
            white-space:nowrap;
        }

        .weather-city svg {
            width:18px;
            height:18px;
        }

        .weather-days {
            display:grid;
            grid-template-columns:repeat(3, minmax(0, 1fr));
            gap:0.34rem;
            min-height:0;
        }

        .weather-day {
            border:1px solid rgba(255,255,255,0.10);
            border-radius:10px;
            background:rgba(255,255,255,0.045);
            padding:0.34rem 0.34rem;
            min-width:0;
        }

        .weather-day-head {
            display:flex;
            justify-content:space-between;
            align-items:baseline;
            gap:0.25rem;
            color:rgba(255,255,255,0.78);
            font-size:0.70rem;
            font-weight:900;
            white-space:nowrap;
        }

        .weather-slots {
            display:grid;
            grid-template-columns:repeat(3, minmax(0, 1fr));
            gap:0.14rem;
            margin-top:0.22rem;
        }

        .weather-slot {
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:0.05rem;
            min-width:0;
            color:rgba(255,255,255,0.50);
            font-size:0.56rem;
            font-weight:800;
        }

        .weather-slot strong {
            color:#38bdf8;
            font-size:1.08rem;
            line-height:1;
        }

        .weather-day:nth-child(2) .weather-slot strong { color:#fb923c; }
        .weather-day:nth-child(3) .weather-slot strong { color:#a78bfa; }

        .weather-desc {
            margin-top:0.15rem;
            color:rgba(255,255,255,0.42);
            font-size:0.66rem;
            font-weight:800;
            text-align:center;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }

        .weather-loading {
            grid-column:1 / -1;
            min-height:64px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:rgba(255,255,255,0.42);
            font-weight:900;
        }

        .date-card {
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        @media (max-width: 1500px) {
            .header-grid { grid-template-columns: minmax(380px, 1fr) minmax(430px, 1fr) 250px; gap:10px; }
            .header-card { padding:0.42rem 0.75rem; }
        }

        @media (max-width: 1150px) {
            .header-grid { grid-template-columns: minmax(320px, 0.9fr) minmax(390px, 1fr) 220px; gap:8px; }
            .header-title-line { font-size:1.35rem; }
            .weather-slot strong { font-size:0.95rem; }
        }

		.center-clock-layout {
			direction: ltr;
			display: grid;
			grid-template-columns: minmax(240px, 300px) auto;
			align-items: center;
			justify-content: center;
			column-gap: clamp(18px, 2vw, 42px);
			width: 100%;
			max-width: 100%;
			height: 100%;
			padding: 0 clamp(8px, 1vw, 18px);
			min-height: 0;
		}

		.clock-info-panel {
			direction: rtl;
			justify-self: end;
			align-self: center;
			width: 280px;
			min-width: 240px;
			margin-right: 0;
			transform: none;
			z-index: 5;
		}

		.clock-canvas-wrap {
			width: 100%;
			height: 100%;
			min-height: 0;
			display: flex;
			align-items: stretch;
			justify-content: center;
			overflow: visible;
		}

		.clock-canvas-wrap canvas {
			width: auto;
			height: 100%;
			flex: none;
		}

        @media (max-width: 900px) {
            .center-clock-layout {
                grid-template-columns: 1fr;
                grid-template-rows: minmax(220px, 1fr) auto;
                gap: 12px;
            }

            .clock-info-panel {
                order: 2;
                width: 100%;
                min-width: 0;
                justify-self: center;
            }

            .clock-canvas-wrap { order: 1; }
        }

        /* ─── Zman cards ────────────────────────────────────────── */
        .bottom-menu {
            width:100%;
            padding:0.34rem 0.48rem;
            border:1px solid rgba(255,255,255,0.10);
            border-radius:16px;
            background:linear-gradient(to top, rgba(0,0,0,0.92), rgba(255,255,255,0.045));
            box-shadow:0 -10px 30px rgba(0,0,0,0.55);
            backdrop-filter:blur(12px);
        }

        .zman-strip {
            direction:rtl;
            display:grid;
            grid-template-columns:repeat(10, minmax(92px, 1fr));
            gap:0.28rem;
            align-items:stretch;
        }

        .zman-card {
            background: rgba(255, 255, 255, 0.05);
            border: 0.2px solid rgba(255, 255, 255, 0.1);
            border-radius:10px;
            min-height:62px;
            padding:0.32rem 0.38rem;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:0.08rem;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            min-width:0;
        }

        .zman-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .active-zman {
            border: 2px solid #fbce07 !important;
            background: rgba(251, 206, 7, 0.15) !important;
            box-shadow: 0 0 20px rgba(251, 206, 7, 0.3);
            transform: scale(1.03);
            z-index: 10;
        }

        .past-zman { opacity:0.48; }

        .zman-label {
            max-width:100%;
            color:rgba(255,255,255,0.86);
            font-size:clamp(0.68rem, 1.05vw, 0.96rem);
            line-height:1.05;
            font-weight:900;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }

        .zman-time {
            font-size:clamp(1.22rem, 1.75vw, 1.72rem);
            line-height:1.05;
            font-weight:800;
            letter-spacing:0;
            font-variant-numeric:tabular-nums;
        }

        .reminder-icon {
            position: absolute;
            top: 8px;
            right: 8px;
            color: #fbce07;
            width: 15px;
            height: 15px;
            animation: bounce 2s infinite;
        }


        /* ─── Footer ────────────────────────────────────────────── */
        .footer-gradient {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), rgba(255, 255, 255, 0.05));
        }

        /* ─── Modal ─────────────────────────────────────────────── */
        .modal-overlay {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
        }

        /* ─── Glow effects ──────────────────────────────────────── */
        .glow-text    { text-shadow: 0 0 30px rgba(251, 206, 7, 0.5); }
        .glow-red     { text-shadow: 0 0 60px rgba(239, 68, 68, 1); }
        .glow-orange  { text-shadow: 0 0 60px rgba(249, 115, 22, 1); }
        .glow-green   { text-shadow: 0 0 60px rgba(34, 197, 94, 1); }
        .glow-blue    { text-shadow: 0 0 60px rgba(59, 130, 246, 1); }
        .parasha-glow { text-shadow: 0 0 25px rgba(56, 189, 248, 0.6); }

        /* ─── Scrollbar ─────────────────────────────────────────── */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ─── Animations ────────────────────────────────────────── */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-4px); }
        }

        @keyframes progress-bar {
            0%   { width: 0%; }
            100% { width: 100%; }
        }

        .progress-animation { animation: progress-bar 30s linear; }

        /* ─── Omer ticker ───────────────────────────────────────── */
        .omer-ticker {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            direction: ltr;
            mask-image: linear-gradient(to right, transparent 0%, white 8%, white 92%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, white 8%, white 92%, transparent 100%);
        }

        .omer-track {
            display: inline-flex;
            align-items: center;
            width: max-content;
            white-space: nowrap;
            will-change: transform;
            animation: omer-marquee 12s linear infinite;
        }

        .omer-track:hover { animation-play-state: paused; }

        .omer-item {
            display: inline-flex;
            align-items: center;
            flex-shrink: 0;
            padding-right: 3rem;
            direction: rtl;
        }

        @keyframes omer-marquee {
            from { transform: translateX(-50%); }
            to   { transform: translateX(0); }
        }

        /* ─── Pasuk ticker ────────────────────────────────────────
           Important: le passouk est toujours rendu dans une zone avec hauteur minimale.
           Si l'appel API échoue, le composant affiche un message de secours. */
        .pasuk-ticker {
            width: 100%;
            min-height: 34px;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            margin-top: 0.25rem;
            padding-top: 0.25rem;
            display:flex;
            align-items:center;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            direction: ltr;
            mask-image: linear-gradient(to right, transparent 0%, white 6%, white 94%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, white 6%, white 94%, transparent 100%);
        }
        .pasuk-track { display:inline-flex; align-items:center; white-space:nowrap; width:max-content; will-change:transform; animation:pasuk-marquee 12s linear infinite; }
        .pasuk-track:hover { animation-play-state: paused; }
        .pasuk-item { display:inline-flex; align-items:center; flex-shrink:0; padding-right:4rem; direction:rtl; }
        .pasuk-text { font-family:'Heebo', Arial, sans-serif; font-size:0.92rem; line-height:1.25; font-weight:700; color:rgba(255,255,255,0.96); }
        .pasuk-ref { color:#fbce07; white-space:nowrap; margin-left:0.6rem; font-weight:900; }
        @keyframes pasuk-marquee { from { transform:translateX(-50%); } to { transform:translateX(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

<script src="dist/app.js"></script>
</body>
</html>
